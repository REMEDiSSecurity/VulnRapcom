openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: VulnRap.com API — Vulnerability Report Validation Platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: reports
    description: Report submission and analysis
  - name: feedback
    description: User feedback
  - name: stats
    description: Platform statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /reports:
    post:
      operationId: submitReport
      tags: [reports]
      summary: Submit a vulnerability report for analysis
      description: Upload a vulnerability report file for similarity checking and sloppiness scoring
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The vulnerability report file (.txt, .md, .pdf). Either file or rawText must be provided.
                rawText:
                  type: string
                  description: Plain text content of the vulnerability report. Either file, rawText, or reportUrl must be provided.
                reportUrl:
                  type: string
                  description: HTTPS URL to a plain-text report (GitHub raw, Gist, GitLab, Pastebin, etc.). Auto-converts GitHub blob URLs to raw. Max 5MB.
                contentMode:
                  type: string
                  enum: [full, similarity_only]
                  default: full
                  description: Privacy mode — full shares content, similarity_only stores only hashes
                showInFeed:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                  description: Whether to show this report in the public recent reports feed
              required:
                - contentMode
      responses:
        "201":
          description: Report submitted and analyzed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportAnalysis"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{id}:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get report analysis results
      description: Retrieve the full analysis for a previously submitted report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportAnalysis"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteReport
      tags: [reports]
      summary: Delete a previously submitted report
      description: Permanently deletes a report and all associated data. Requires the delete token returned at submission time.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteReportBody"
      responses:
        "200":
          description: Report deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteReportResponse"
        "403":
          description: Invalid delete token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{id}/verify:
    get:
      operationId: getVerification
      tags: [reports]
      summary: Get verification badge data for a report
      description: Returns a lightweight verification summary for embedding in bug reports
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Verification data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationBadge"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{id}/compare/{matchId}:
    get:
      operationId: compareReports
      tags: [reports]
      summary: Compare two reports side by side
      description: Returns redacted text snippets of both reports for side-by-side similarity comparison
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comparison data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportComparison"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/check:
    post:
      operationId: checkReport
      tags: [reports]
      summary: Check a report against the database without storing it
      description: For report receivers -- analyze a report for similarity and sloppiness without adding it to the database
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The vulnerability report file (.txt, .md, .pdf)
                rawText:
                  type: string
                  description: Plain text content of the vulnerability report
                reportUrl:
                  type: string
                  description: HTTPS URL to a plain-text report (GitHub raw, Gist, GitLab, Pastebin, etc.). Auto-converts GitHub blob URLs to raw. Max 5MB.
              required: []
      responses:
        "200":
          description: Check results (not stored)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/lookup/{hash}:
    get:
      operationId: lookupByHash
      tags: [reports]
      summary: Look up a report by content hash
      description: Check if a report with the given SHA-256 content hash has been seen before
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
            minLength: 64
            pattern: "^[a-fA-F0-9]{64}$"
            maxLength: 64
      responses:
        "200":
          description: Hash lookup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HashLookupResult"

  /reports/feed:
    get:
      operationId: getReportFeed
      tags: [reports]
      summary: Get recent public reports
      description: Returns recent reports that submitters opted to show in the public feed
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: Recent public reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportFeed"

  /feedback:
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit user feedback about the tool
      description: Allows users to share whether the tool was helpful and suggest improvements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitFeedbackBody"
      responses:
        "201":
          description: Feedback submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get platform statistics
      description: Returns aggregate statistics for the platform
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /stats/recent:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Get recent submission activity
      description: Returns a summary of recent report submissions
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentActivity"

  /stats/distribution:
    get:
      operationId: getSlopDistribution
      tags: [stats]
      summary: Get slop score distribution
      description: Returns the distribution of slop scores across all reports
      responses:
        "200":
          description: Score distribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlopDistribution"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SimilarityMatch:
      type: object
      properties:
        reportId:
          type: integer
        similarity:
          type: integer
          description: Similarity percentage (0-100)
        matchType:
          type: string
          enum: [near-duplicate, high-similarity, structural, semantic]
      required:
        - reportId
        - similarity
        - matchType

    SectionMatchItem:
      type: object
      properties:
        sectionTitle:
          type: string
        matchedReportId:
          type: integer
        matchedSectionTitle:
          type: string
        similarity:
          type: integer
      required:
        - sectionTitle
        - matchedReportId
        - matchedSectionTitle
        - similarity

    RedactionSummary:
      type: object
      properties:
        totalRedactions:
          type: integer
        categories:
          type: object
          additionalProperties:
            type: integer
      required:
        - totalRedactions
        - categories

    DeleteReportBody:
      type: object
      properties:
        deleteToken:
          type: string
          description: The delete token returned when the report was submitted
      required:
        - deleteToken

    DeleteReportResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ReportAnalysis:
      type: object
      properties:
        id:
          type: integer
        deleteToken:
          type: string
          description: Secret token for deleting this report. Only returned on initial submission. Store it — it cannot be recovered.
        contentHash:
          type: string
        contentMode:
          type: string
          enum: [full, similarity_only]
        slopScore:
          type: integer
          description: Sloppiness score 0-100 (higher = more suspicious)
        slopTier:
          type: string
          description: Human-readable sloppiness tier
        similarityMatches:
          type: array
          items:
            $ref: "#/components/schemas/SimilarityMatch"
        sectionHashes:
          type: object
          additionalProperties:
            type: string
          description: SHA-256 hashes of each report section for granular similarity
        sectionMatches:
          type: array
          items:
            $ref: "#/components/schemas/SectionMatchItem"
          description: Sections that match existing reports
        redactedText:
          type: ["string", "null"]
          description: Auto-redacted version of the report (PII/secrets removed)
        redactionSummary:
          $ref: "#/components/schemas/RedactionSummary"
        feedback:
          type: array
          items:
            type: string
          description: Heuristic feedback strings — specific issues flagged by the rule-based engine
        llmSlopScore:
          type: ["integer", "null"]
          description: LLM-enhanced slop score (0–100). Null when LLM analysis is unavailable or timed out. When present, the final slopScore is a weighted blend (40% heuristic + 60% LLM).
        llmFeedback:
          type: ["array", "null"]
          items:
            type: string
          description: Semantic observations from the LLM scorer — covers technical specificity, coherence, genericity, and narrative credibility. Null when LLM analysis is unavailable.
        llmEnhanced:
          type: boolean
          description: True when LLM analysis contributed to the final slopScore. False means the score is purely heuristic.
        fileName:
          type: ["string", "null"]
        fileSize:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - contentHash
        - contentMode
        - slopScore
        - slopTier
        - similarityMatches
        - sectionHashes
        - sectionMatches
        - redactionSummary
        - feedback
        - llmEnhanced
        - fileSize
        - createdAt

    VerificationBadge:
      type: object
      properties:
        id:
          type: integer
        reportCode:
          type: string
          description: Human-readable report code (e.g. VR-000B)
        slopScore:
          type: integer
        slopTier:
          type: string
        similarityMatchCount:
          type: integer
        sectionMatchCount:
          type: integer
        contentHash:
          type: string
        verifyUrl:
          type: string
          description: Public URL to verify this report
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - reportCode
        - slopScore
        - slopTier
        - similarityMatchCount
        - sectionMatchCount
        - contentHash
        - verifyUrl
        - createdAt

    CheckResult:
      type: object
      properties:
        slopScore:
          type: integer
        slopTier:
          type: string
        similarityMatches:
          type: array
          items:
            $ref: "#/components/schemas/SimilarityMatch"
        sectionHashes:
          type: object
          additionalProperties:
            type: string
        sectionMatches:
          type: array
          items:
            $ref: "#/components/schemas/SectionMatchItem"
        redactionSummary:
          $ref: "#/components/schemas/RedactionSummary"
        feedback:
          type: array
          items:
            type: string
          description: Heuristic feedback strings — specific issues flagged by the rule-based engine
        llmSlopScore:
          type: ["integer", "null"]
          description: LLM-enhanced slop score (0–100). Null when LLM analysis is unavailable or timed out.
        llmFeedback:
          type: ["array", "null"]
          items:
            type: string
          description: Semantic observations from the LLM scorer. Null when LLM analysis is unavailable.
        llmEnhanced:
          type: boolean
          description: True when LLM analysis contributed to the final slopScore.
        previouslySubmitted:
          type: boolean
          description: Whether this exact report was found in the database
        existingReportId:
          type: ["integer", "null"]
          description: If previously submitted, the existing report ID
      required:
        - slopScore
        - slopTier
        - similarityMatches
        - sectionHashes
        - sectionMatches
        - redactionSummary
        - feedback
        - llmEnhanced
        - previouslySubmitted

    HashLookupResult:
      type: object
      properties:
        found:
          type: boolean
        reportId:
          type: ["integer", "null"]
        slopScore:
          type: ["integer", "null"]
        slopTier:
          type: ["string", "null"]
        matchCount:
          type: integer
          description: Number of similar reports found
        firstSeen:
          type: ["string", "null"]
          format: date-time
      required:
        - found
        - matchCount

    PlatformStats:
      type: object
      properties:
        totalReports:
          type: integer
        duplicatesDetected:
          type: integer
        avgSlopScore:
          type: number
        reportsByMode:
          type: object
          properties:
            full:
              type: integer
            similarity_only:
              type: integer
          required:
            - full
            - similarity_only
        reportsToday:
          type: integer
        reportsThisWeek:
          type: integer
      required:
        - totalReports
        - duplicatesDetected
        - avgSlopScore
        - reportsByMode
        - reportsToday
        - reportsThisWeek

    RecentActivity:
      type: object
      properties:
        recentReports:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              slopScore:
                type: integer
              slopTier:
                type: string
              matchCount:
                type: integer
              createdAt:
                type: string
                format: date-time
            required:
              - id
              - slopScore
              - slopTier
              - matchCount
              - createdAt
      required:
        - recentReports

    ReportFeed:
      type: object
      properties:
        reports:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              reportCode:
                type: string
              slopScore:
                type: integer
              slopTier:
                type: string
              matchCount:
                type: integer
              contentMode:
                type: string
                enum: [full, similarity_only]
              createdAt:
                type: string
                format: date-time
            required:
              - id
              - reportCode
              - slopScore
              - slopTier
              - matchCount
              - contentMode
              - createdAt
      required:
        - reports

    SlopDistribution:
      type: object
      properties:
        buckets:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              min:
                type: integer
              max:
                type: integer
              count:
                type: integer
            required:
              - label
              - min
              - max
              - count
        totalReports:
          type: integer
      required:
        - buckets
        - totalReports

    ReportComparison:
      type: object
      properties:
        sourceReport:
          type: object
          properties:
            id:
              type: integer
            reportCode:
              type: string
            snippet:
              type: ["string", "null"]
              description: First 2000 chars of redacted text (null if similarity_only mode)
            slopScore:
              type: integer
            slopTier:
              type: string
            createdAt:
              type: string
              format: date-time
          required:
            - id
            - reportCode
            - slopScore
            - slopTier
            - createdAt
        matchedReport:
          type: object
          properties:
            id:
              type: integer
            reportCode:
              type: string
            snippet:
              type: ["string", "null"]
              description: First 2000 chars of redacted text (null if similarity_only mode)
            slopScore:
              type: integer
            slopTier:
              type: string
            createdAt:
              type: string
              format: date-time
          required:
            - id
            - reportCode
            - slopScore
            - slopTier
            - createdAt
        similarity:
          type: integer
          description: Similarity percentage between the two reports
        matchType:
          type: string
      required:
        - sourceReport
        - matchedReport
        - similarity
        - matchType

    SubmitFeedbackBody:
      type: object
      properties:
        reportId:
          type: integer
          description: The report ID this feedback is about (optional)
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Rating from 1 (not useful) to 5 (very useful)
        helpful:
          type: boolean
          description: Whether the tool was helpful overall
        comment:
          type: string
          maxLength: 1000
          description: Optional free-text suggestions for improvement
      required:
        - rating
        - helpful

    FeedbackResponse:
      type: object
      properties:
        id:
          type: integer
        message:
          type: string
      required:
        - id
        - message
