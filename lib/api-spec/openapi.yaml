openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 2.0.0
  description: VulnRap.com API — Vulnerability Report Validation Platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: reports
    description: Report submission and analysis
  - name: feedback
    description: User feedback
  - name: stats
    description: Platform statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /reports:
    post:
      operationId: submitReport
      tags: [reports]
      summary: Submit a vulnerability report for analysis
      description: Upload a vulnerability report file for similarity checking and sloppiness scoring
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The vulnerability report file (.txt, .md, .pdf). Either file or rawText must be provided.
                rawText:
                  type: string
                  description: Plain text content of the vulnerability report. Either file, rawText, or reportUrl must be provided.
                reportUrl:
                  type: string
                  description: HTTPS URL to a plain-text report (GitHub raw, Gist, GitLab, Pastebin, etc.). Auto-converts GitHub blob URLs to raw. Max 5MB.
                contentMode:
                  type: string
                  enum: [full, similarity_only]
                  default: full
                  description: Privacy mode — full shares content, similarity_only stores only hashes
                showInFeed:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                  description: Whether to show this report in the public recent reports feed
              required:
                - contentMode
      responses:
        "201":
          description: Report submitted and analyzed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportAnalysis"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{id}:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get report analysis results
      description: Retrieve the full analysis for a previously submitted report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportAnalysis"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteReport
      tags: [reports]
      summary: Delete a previously submitted report
      description: Permanently deletes a report and all associated data. Requires the delete token returned at submission time.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteReportBody"
      responses:
        "200":
          description: Report deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteReportResponse"
        "403":
          description: Invalid delete token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{id}/verify:
    get:
      operationId: getVerification
      tags: [reports]
      summary: Get verification badge data for a report
      description: Returns a lightweight verification summary for embedding in bug reports
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Verification data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationBadge"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{id}/compare/{matchId}:
    get:
      operationId: compareReports
      tags: [reports]
      summary: Compare two reports side by side
      description: Returns redacted text snippets of both reports for side-by-side similarity comparison
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comparison data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportComparison"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{id}/triage-report:
    get:
      operationId: getTriageReport
      tags: [reports]
      summary: Get exportable markdown triage report
      description: Returns a formatted markdown summary with score, verification results, evidence, recommendation, and challenge questions — ready to paste into Jira/ServiceNow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Triage report markdown
          content:
            text/markdown:
              schema:
                type: string
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/check:
    post:
      operationId: checkReport
      tags: [reports]
      summary: Check a report against the database without storing it
      description: For report receivers -- analyze a report for similarity and sloppiness without adding it to the database
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The vulnerability report file (.txt, .md, .pdf)
                rawText:
                  type: string
                  description: Plain text content of the vulnerability report
                reportUrl:
                  type: string
                  description: HTTPS URL to a plain-text report (GitHub raw, Gist, GitLab, Pastebin, etc.). Auto-converts GitHub blob URLs to raw. Max 5MB.
              required: []
      responses:
        "200":
          description: Check results (not stored)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/lookup/{hash}:
    get:
      operationId: lookupByHash
      tags: [reports]
      summary: Look up a report by content hash
      description: Check if a report with the given SHA-256 content hash has been seen before
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
            minLength: 64
            pattern: "^[a-fA-F0-9]{64}$"
            maxLength: 64
      responses:
        "200":
          description: Hash lookup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HashLookupResult"

  /reports/feed:
    get:
      operationId: getReportFeed
      tags: [reports]
      summary: Get recent public reports
      description: Returns recent reports that submitters opted to show in the public feed
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: Recent public reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportFeed"

  /feedback:
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit user feedback about the tool
      description: Allows users to share whether the tool was helpful and suggest improvements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitFeedbackBody"
      responses:
        "201":
          description: Feedback submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get platform statistics
      description: Returns aggregate statistics for the platform
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /stats/recent:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Get recent submission activity
      description: Returns a summary of recent report submissions
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentActivity"

  /stats/distribution:
    get:
      operationId: getSlopDistribution
      tags: [stats]
      summary: Get slop score distribution
      description: Returns the distribution of slop scores across all reports
      responses:
        "200":
          description: Score distribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlopDistribution"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SimilarityMatch:
      type: object
      properties:
        reportId:
          type: integer
        similarity:
          type: integer
          description: Similarity percentage (0-100)
        matchType:
          type: string
          enum: [near-duplicate, high-similarity, structural, semantic]
      required:
        - reportId
        - similarity
        - matchType

    SectionMatchItem:
      type: object
      properties:
        sectionTitle:
          type: string
        matchedReportId:
          type: integer
        matchedSectionTitle:
          type: string
        similarity:
          type: integer
      required:
        - sectionTitle
        - matchedReportId
        - matchedSectionTitle
        - similarity

    RedactionSummary:
      type: object
      properties:
        totalRedactions:
          type: integer
        categories:
          type: object
          additionalProperties:
            type: integer
      required:
        - totalRedactions
        - categories

    DeleteReportBody:
      type: object
      properties:
        deleteToken:
          type: string
          description: The delete token returned when the report was submitted
      required:
        - deleteToken

    DeleteReportResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ReportAnalysis:
      type: object
      properties:
        id:
          type: integer
        deleteToken:
          type: string
          description: Secret token for deleting this report. Only returned on initial submission. Store it — it cannot be recovered.
        contentHash:
          type: string
        contentMode:
          type: string
          enum: [full, similarity_only]
        slopScore:
          type: integer
          description: AI slop likelihood score 0-100 (higher = more likely AI-generated)
        slopTier:
          type: string
          description: Human-readable sloppiness tier
        qualityScore:
          type: integer
          description: Report quality/completeness score 0-100 (higher = better quality). Separate from slopScore — a terse real report can have low quality but also low slop.
        confidence:
          type: number
          format: float
          description: Confidence in the slopScore (0.0-1.0). Low confidence means limited signals were available.
        breakdown:
          $ref: "#/components/schemas/ScoreBreakdown"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceItem"
          description: Specific signals found during analysis with their weights
        similarityMatches:
          type: array
          items:
            $ref: "#/components/schemas/SimilarityMatch"
        sectionHashes:
          type: object
          additionalProperties:
            type: string
          description: SHA-256 hashes of each report section for granular similarity
        sectionMatches:
          type: array
          items:
            $ref: "#/components/schemas/SectionMatchItem"
          description: Sections that match existing reports
        redactedText:
          type: ["string", "null"]
          description: Auto-redacted version of the report (PII/secrets removed)
        redactionSummary:
          $ref: "#/components/schemas/RedactionSummary"
        feedback:
          type: array
          items:
            type: string
          description: Heuristic feedback strings — specific issues flagged by the rule-based engine
        llmSlopScore:
          type: ["integer", "null"]
          description: LLM analysis slop score (0–100), weighted from 5 dimensions (specificity, originality, voice, coherence, hallucination). Null when LLM is unavailable. Contributes to the fused slopScore via multi-axis Bayesian combination.
        llmFeedback:
          type: ["array", "null"]
          items:
            type: string
          description: Semantic observations from the LLM scorer. Null when LLM analysis is unavailable.
        llmBreakdown:
          type: ["object", "null"]
          properties:
            specificity:
              type: integer
            originality:
              type: integer
            voice:
              type: integer
            coherence:
              type: integer
            hallucination:
              type: integer
          description: Per-dimension LLM scores (0-100 each). Null when LLM analysis is unavailable.
        humanIndicators:
          type: array
          items:
            $ref: "#/components/schemas/HumanIndicator"
          description: Detected human-writing signals that reduced the slop score
        adjustedScore:
          type: ["integer", "null"]
          description: Client-adjusted slop score based on sensitivity profile. Null when no adjustment applied (balanced preset).
        sensitivityProfile:
          type: ["string", "null"]
          enum: ["lenient", "balanced", "strict", null]
          description: Active sensitivity preset used for score adjustment. Null when default (balanced).
        llmEnhanced:
          type: boolean
          description: True when LLM analysis contributed to the final slopScore. False means the score is purely heuristic.
        verification:
          oneOf:
            - $ref: "#/components/schemas/Verification"
            - type: "null"
          description: Active content verification results (GitHub, NVD, PoC checks). Null when verification was not performed.
        triageRecommendation:
          oneOf:
            - $ref: "#/components/schemas/TriageRecommendation"
            - type: "null"
          description: Automated triage action recommendation with challenge questions and behavioral signals. Null when not computed.
        triageAssistant:
          oneOf:
            - $ref: "#/components/schemas/TriageAssistant"
            - type: "null"
          description: AI triage assistant with reproduction guidance, gap analysis, don't-miss warnings, and reporter feedback. Null when not computed.
        fileName:
          type: ["string", "null"]
        fileSize:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - contentHash
        - contentMode
        - slopScore
        - slopTier
        - qualityScore
        - confidence
        - breakdown
        - evidence
        - similarityMatches
        - sectionHashes
        - sectionMatches
        - redactionSummary
        - feedback
        - llmEnhanced
        - fileSize
        - createdAt

    VerificationBadge:
      type: object
      properties:
        id:
          type: integer
        reportCode:
          type: string
          description: Human-readable report code (e.g. VR-000B)
        slopScore:
          type: integer
        slopTier:
          type: string
        similarityMatchCount:
          type: integer
        sectionMatchCount:
          type: integer
        contentHash:
          type: string
        verifyUrl:
          type: string
          description: Public URL to verify this report
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - reportCode
        - slopScore
        - slopTier
        - similarityMatchCount
        - sectionMatchCount
        - contentHash
        - verifyUrl
        - createdAt

    CheckResult:
      type: object
      properties:
        slopScore:
          type: integer
        slopTier:
          type: string
        qualityScore:
          type: integer
          description: Report quality/completeness score 0-100
        confidence:
          type: number
          format: float
          description: Confidence in the slopScore (0.0-1.0)
        breakdown:
          $ref: "#/components/schemas/ScoreBreakdown"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceItem"
        similarityMatches:
          type: array
          items:
            $ref: "#/components/schemas/SimilarityMatch"
        sectionHashes:
          type: object
          additionalProperties:
            type: string
        sectionMatches:
          type: array
          items:
            $ref: "#/components/schemas/SectionMatchItem"
        redactionSummary:
          $ref: "#/components/schemas/RedactionSummary"
        feedback:
          type: array
          items:
            type: string
          description: Heuristic feedback strings
        llmSlopScore:
          type: ["integer", "null"]
        llmFeedback:
          type: ["array", "null"]
          items:
            type: string
        llmBreakdown:
          type: ["object", "null"]
          properties:
            specificity:
              type: integer
            originality:
              type: integer
            voice:
              type: integer
            coherence:
              type: integer
            hallucination:
              type: integer
        humanIndicators:
          type: array
          items:
            $ref: "#/components/schemas/HumanIndicator"
          description: Detected human-writing signals that reduced the slop score
        adjustedScore:
          type: ["integer", "null"]
          description: Client-adjusted slop score based on sensitivity profile. Null when no adjustment applied.
        sensitivityProfile:
          type: ["string", "null"]
          enum: ["lenient", "balanced", "strict", null]
          description: Active sensitivity preset used for score adjustment. Null when default.
        llmEnhanced:
          type: boolean
        verification:
          oneOf:
            - $ref: "#/components/schemas/Verification"
            - type: "null"
          description: Active content verification results. Null when verification was not performed.
        triageRecommendation:
          oneOf:
            - $ref: "#/components/schemas/TriageRecommendation"
            - type: "null"
          description: Automated triage action recommendation with challenge questions and behavioral signals. Null when not computed.
        triageAssistant:
          oneOf:
            - $ref: "#/components/schemas/TriageAssistant"
            - type: "null"
          description: AI triage assistant with reproduction guidance, gap analysis, don't-miss warnings, and reporter feedback. Null when not computed.
        previouslySubmitted:
          type: boolean
          description: Whether this exact report was found in the database
        existingReportId:
          type: ["integer", "null"]
          description: If previously submitted, the existing report ID
      required:
        - slopScore
        - slopTier
        - qualityScore
        - confidence
        - breakdown
        - evidence
        - similarityMatches
        - sectionHashes
        - sectionMatches
        - redactionSummary
        - feedback
        - llmEnhanced
        - previouslySubmitted

    HashLookupResult:
      type: object
      properties:
        found:
          type: boolean
        reportId:
          type: ["integer", "null"]
        slopScore:
          type: ["integer", "null"]
        slopTier:
          type: ["string", "null"]
        matchCount:
          type: integer
          description: Number of similar reports found
        firstSeen:
          type: ["string", "null"]
          format: date-time
      required:
        - found
        - matchCount

    PlatformStats:
      type: object
      properties:
        totalReports:
          type: integer
        duplicatesDetected:
          type: integer
        avgSlopScore:
          type: number
        reportsByMode:
          type: object
          properties:
            full:
              type: integer
            similarity_only:
              type: integer
          required:
            - full
            - similarity_only
        reportsToday:
          type: integer
        reportsThisWeek:
          type: integer
      required:
        - totalReports
        - duplicatesDetected
        - avgSlopScore
        - reportsByMode
        - reportsToday
        - reportsThisWeek

    RecentActivity:
      type: object
      properties:
        recentReports:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              slopScore:
                type: integer
              slopTier:
                type: string
              matchCount:
                type: integer
              createdAt:
                type: string
                format: date-time
            required:
              - id
              - slopScore
              - slopTier
              - matchCount
              - createdAt
      required:
        - recentReports

    ReportFeed:
      type: object
      properties:
        reports:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              reportCode:
                type: string
              slopScore:
                type: integer
              slopTier:
                type: string
              matchCount:
                type: integer
              contentMode:
                type: string
                enum: [full, similarity_only]
              createdAt:
                type: string
                format: date-time
            required:
              - id
              - reportCode
              - slopScore
              - slopTier
              - matchCount
              - contentMode
              - createdAt
      required:
        - reports

    SlopDistribution:
      type: object
      properties:
        buckets:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              min:
                type: integer
              max:
                type: integer
              count:
                type: integer
            required:
              - label
              - min
              - max
              - count
        totalReports:
          type: integer
      required:
        - buckets
        - totalReports

    ComparisonReportDetail:
      type: object
      properties:
        id:
          type: integer
        reportCode:
          type: string
        snippet:
          type: ["string", "null"]
          description: First 2000 chars of redacted text (null if similarity_only mode)
        slopScore:
          type: integer
        slopTier:
          type: string
        contentMode:
          type: string
          enum: [full, similarity_only]
        sectionHashes:
          type: object
          additionalProperties:
            type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - reportCode
        - slopScore
        - slopTier
        - contentMode
        - createdAt

    SectionComparisonItem:
      type: object
      properties:
        sectionTitle:
          type: string
        status:
          type: string
          enum: [identical, different, unique]
          description: Whether this section is identical, different, or only in one report
        sourceHash:
          type: ["string", "null"]
        matchedHash:
          type: ["string", "null"]
      required:
        - sectionTitle
        - status

    ReportComparison:
      type: object
      properties:
        sourceReport:
          $ref: "#/components/schemas/ComparisonReportDetail"
        matchedReport:
          $ref: "#/components/schemas/ComparisonReportDetail"
        similarity:
          type: integer
          description: Similarity percentage between the two reports
        matchType:
          type: string
        sectionComparison:
          type: array
          items:
            $ref: "#/components/schemas/SectionComparisonItem"
          description: Section-by-section comparison showing identical, different, and unique sections
        identicalSections:
          type: integer
          description: Number of sections with identical content
        totalSections:
          type: integer
          description: Total unique sections across both reports
      required:
        - sourceReport
        - matchedReport
        - similarity
        - matchType
        - sectionComparison
        - identicalSections
        - totalSections

    VerificationCheck:
      type: object
      properties:
        type:
          type: string
          description: Check type identifier (e.g. github_file_verified, cve_not_in_nvd, poc_placeholder_textbook)
        target:
          type: string
          description: The reference being verified (e.g. repo:filepath, CVE-ID)
        result:
          type: string
          enum: [verified, not_found, warning, error, skipped]
        detail:
          type: string
          description: Human-readable explanation of the check result
        weight:
          type: integer
          description: Score weight (negative = human signal, positive = slop signal)
      required:
        - type
        - target
        - result
        - detail
        - weight

    VerificationSummary:
      type: object
      properties:
        verified:
          type: integer
        notFound:
          type: integer
        warnings:
          type: integer
        errors:
          type: integer
      required:
        - verified
        - notFound
        - warnings
        - errors

    DetectedProject:
      type: object
      properties:
        name:
          type: string
        repoSlug:
          type: string
        source:
          type: string
          description: How the project was detected (github_url, gitlab_url, known_project)
      required:
        - name
        - repoSlug
        - source

    Verification:
      type: object
      properties:
        checks:
          type: array
          items:
            $ref: "#/components/schemas/VerificationCheck"
        summary:
          $ref: "#/components/schemas/VerificationSummary"
        triageNotes:
          type: array
          items:
            type: string
          description: Actionable notes for PSIRT triage based on verification results
        score:
          type: integer
          description: Verification axis score (0-100, 50=neutral, above=slop signals, below=human signals)
        detectedProjects:
          type: array
          items:
            $ref: "#/components/schemas/DetectedProject"
      required:
        - checks
        - summary
        - triageNotes
        - score
        - detectedProjects

    ScoreBreakdown:
      type: object
      properties:
        linguistic:
          type: integer
          description: Linguistic AI fingerprinting score (0-100)
        factual:
          type: integer
          description: Factual verification score (0-100)
        template:
          type: integer
          description: Template/mass-submission pattern score (0-100)
        llm:
          type: ["integer", "null"]
          description: LLM analysis score (0-100), null if LLM unavailable
        verification:
          type: ["integer", "null"]
          description: Active content verification score (0-100, 50=neutral). Null when no verifiable references found.
        quality:
          type: integer
          description: Report quality score (0-100)
      required:
        - linguistic
        - factual
        - template
        - quality

    HumanIndicator:
      type: object
      properties:
        type:
          type: string
          description: Human indicator type (e.g. human_contractions, human_terse_style)
        description:
          type: string
          description: Human-readable description of the human signal
        weight:
          type: integer
          description: Negative weight (reduces slop score)
        matched:
          type: ["string", "null"]
          description: The specific text that triggered this indicator
      required:
        - type
        - description
        - weight

    EvidenceItem:
      type: object
      properties:
        type:
          type: string
          description: Evidence type identifier (e.g. ai_phrase, placeholder_url, severity_inflation)
        description:
          type: string
          description: Human-readable description of the signal
        weight:
          type: integer
          description: Weight/importance of this signal (higher = more significant)
        matched:
          type: ["string", "null"]
          description: The specific text or pattern that was matched
      required:
        - type
        - description
        - weight

    TriageRecommendation:
      type: object
      properties:
        action:
          type: string
          enum: [AUTO_CLOSE, MANUAL_REVIEW, CHALLENGE_REPORTER, PRIORITIZE, STANDARD_TRIAGE]
          description: Recommended triage action based on score, confidence, and verification results
        reason:
          type: string
          description: Why this action was recommended
        note:
          type: string
          description: Detailed guidance for the triager
        challengeQuestions:
          type: array
          items:
            $ref: "#/components/schemas/ChallengeQuestion"
          description: Questions to send to the reporter to verify legitimacy (1-4 questions based on detected issues)
        temporalSignals:
          type: array
          items:
            $ref: "#/components/schemas/TemporalSignal"
          description: Behavioral signals based on CVE publication timing
        templateMatch:
          oneOf:
            - $ref: "#/components/schemas/TemplateMatch"
            - type: "null"
          description: Template reuse detection result. Null when no template match found.
        revision:
          oneOf:
            - $ref: "#/components/schemas/RevisionResult"
            - type: "null"
          description: Revision tracking result — detected when a report is a revision of a recent submission. Null when not a revision.
      required:
        - action
        - reason
        - note
        - challengeQuestions
        - temporalSignals

    ChallengeQuestion:
      type: object
      properties:
        category:
          type: string
          description: Question category (missing_file, missing_function, nvd_plagiarism, invalid_cve, placeholder_poc, severity_inflation, fabricated_output)
        question:
          type: string
          description: The question to send to the reporter
        context:
          type: string
          description: Context about why this question was generated
      required:
        - category
        - question
        - context

    TemporalSignal:
      type: object
      properties:
        cveId:
          type: string
        publishedDate:
          type: string
          format: date-time
        hoursSincePublication:
          type: number
        signal:
          type: string
          enum: [suspiciously_fast, fast_turnaround, normal]
        weight:
          type: integer
      required:
        - cveId
        - publishedDate
        - hoursSincePublication
        - signal
        - weight

    TemplateMatch:
      type: object
      properties:
        templateHash:
          type: string
        matchedReportIds:
          type: array
          items:
            type: integer
        weight:
          type: integer
      required:
        - templateHash
        - matchedReportIds
        - weight

    RevisionResult:
      type: object
      properties:
        originalReportId:
          type: integer
        originalScore:
          type: integer
        similarity:
          type: number
        scoreChange:
          type: integer
          description: Score change from original (negative = improved, positive = worsened)
        direction:
          type: string
          enum: [improved, worsened, unchanged]
        changeSummary:
          type: string
          description: Brief summary of what changed between original and revision
      required:
        - originalReportId
        - originalScore
        - similarity
        - scoreChange
        - direction

    ReproStep:
      type: object
      properties:
        order:
          type: integer
        instruction:
          type: string
        note:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
          enum: [heuristic, llm, null]
      required:
        - order
        - instruction

    ReproGuidance:
      type: object
      properties:
        vulnClass:
          type: string
        confidence:
          type: number
        steps:
          type: array
          items:
            $ref: "#/components/schemas/ReproStep"
        environment:
          type: array
          items:
            type: string
        tools:
          type: array
          items:
            type: string
      required:
        - vulnClass
        - confidence
        - steps
        - environment
        - tools

    GapItem:
      type: object
      properties:
        category:
          type: string
        severity:
          type: string
          enum: [critical, important, minor]
        description:
          type: string
        suggestion:
          type: string
        audience:
          type: ["string", "null"]
          enum: [triager, reporter, both, null]
      required:
        - category
        - severity
        - description
        - suggestion

    DontMissItem:
      type: object
      properties:
        area:
          type: string
        warning:
          type: string
        reason:
          type: string
      required:
        - area
        - warning
        - reason

    ReporterFeedbackItem:
      type: object
      properties:
        tone:
          type: string
          enum: [positive, neutral, concern]
        message:
          type: string
        priority:
          type: ["integer", "null"]
      required:
        - tone
        - message

    LLMTriageGuidance:
      type: object
      properties:
        reproSteps:
          type: array
          items:
            type: string
        missingInfo:
          type: array
          items:
            type: string
        dontMiss:
          type: array
          items:
            type: string
        reporterFeedback:
          type: string
      required:
        - reproSteps
        - missingInfo
        - dontMiss
        - reporterFeedback

    TriageAssistant:
      type: object
      properties:
        reproGuidance:
          oneOf:
            - $ref: "#/components/schemas/ReproGuidance"
            - type: "null"
        gaps:
          type: array
          items:
            $ref: "#/components/schemas/GapItem"
        dontMiss:
          type: array
          items:
            $ref: "#/components/schemas/DontMissItem"
        reporterFeedback:
          type: array
          items:
            $ref: "#/components/schemas/ReporterFeedbackItem"
        llmTriageGuidance:
          oneOf:
            - $ref: "#/components/schemas/LLMTriageGuidance"
            - type: "null"
      required:
        - gaps
        - dontMiss
        - reporterFeedback

    SubmitFeedbackBody:
      type: object
      properties:
        reportId:
          type: integer
          description: The report ID this feedback is about (optional)
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Rating from 1 (not useful) to 5 (very useful)
        helpful:
          type: boolean
          description: Whether the tool was helpful overall
        comment:
          type: string
          maxLength: 1000
          description: Optional free-text suggestions for improvement
      required:
        - rating
        - helpful

    FeedbackResponse:
      type: object
      properties:
        id:
          type: integer
        message:
          type: string
      required:
        - id
        - message
